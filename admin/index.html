<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Rahnuma Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Rahnuma Shop</h2>
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard" onclick="loadPage('dashboard')">📊 Dashboard</a>
        <a href="#" class="nav-item" data-page="orders" onclick="loadPage('orders')">📦 Orders</a>
        <a href="#" class="nav-item" data-page="products" onclick="loadPage('products')">🏷 Products</a>
        <a href="#" class="nav-item" data-page="categories" onclick="loadPage('categories')">📁 Categories</a>
        <a href="#" class="nav-item" data-page="customers" onclick="loadPage('customers')">👥 Customers</a>
        <a href="#" class="nav-item" data-page="coupons" onclick="loadPage('coupons')">🎫 Coupons</a>
        <a href="#" class="nav-item" data-page="expenses" onclick="loadPage('expenses')">💸 Expenses</a>
        <a href="#" class="nav-item" data-page="reports" onclick="loadPage('reports')">📈 Reports</a>
        <a href="#" class="nav-item" data-page="pages" onclick="loadPage('pages')">📄 Landing Pages</a>
        <a href="#" class="nav-item" data-page="fraud" onclick="loadPage('fraud')">🛡 Fraud Protection</a>
        <a href="#" class="nav-item" data-page="settings" onclick="loadPage('settings')">⚙ Settings</a>
        <div class="sidebar-divider"></div>
        <a href="/" class="nav-item" target="_blank">🌐 View Shop</a>
        <a href="#" class="nav-item" onclick="logout()">🚪 Logout</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="header-user" id="headerUser"></div>
      </header>
      <div class="page-content" id="pageContent">
        <div style="text-align:center;padding:60px"><p>Loading...</p></div>
      </div>
    </main>
  </div>

<script src="/admin/js/admin.js"></script>
</body>
</html>
